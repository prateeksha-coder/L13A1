<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <title>Online Store Grid</title>
</head>

<body>

    <div class="container">
        <h1>Online Store Layout</h1>

        <!-- Header -->
        <div class="row">
            <div class="col-md-12" style="background-color: lightblue;">
                <h3>Store Header</h3>
            </div>
        </div>

        <!-- Navigation -->
        <div class="row">
            <div class="col-md-3 col-sm-4 col-xs-12" style="background-color: lightgreen;">
                <h4>Menu</h4>
                <p>Home</p>
                <p>Products</p>
                <p>Contact</p>
            </div>

            <div class="col-md-9 col-sm-8 col-xs-12" style="background-color: lightyellow;">
                <h4>Featured Product</h4>
                <p>Latest items available in our store.</p>
            </div>
        </div>

        <!-- Products -->
        <div class="row">
            <div class="col-md-4 col-sm-6 col-xs-12" style="background-color: pink;">
                <h5>Product 1</h5>
                <p>Price: $10</p>
            </div>

            <div class="col-md-4 col-sm-6 col-xs-12" style="background-color: orange;">
                <h5>Product 2</h5>
                <p>Price: $20</p>
            </div>

            <div class="col-md-4 col-sm-12 col-xs-12" style="background-color: lightgray;">
                <h5>Product 3</h5>
                <p>Price: $30</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="row">
            <div class="col-md-12" style="background-color: lightblue;">
                <h4>Footer</h4>
                <p>Copyright 2026</p>
            </div>
        </div>

    </div>

</body>

</html>
